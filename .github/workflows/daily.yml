name: Daily Telegram Message

on:
  schedule:
    - cron: '1 16 * * *'   # 每天 UTC 16:01 (北京时间 0:01)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # 允许后续推送

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Send Telegram message
        run: python send.py
        env:                          # ⚠️ 关键：将 Secrets 传递给脚本
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit and push progress update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add progress.txt
          git diff --cached --quiet || git commit -m "Update progress.txt"
          git push
